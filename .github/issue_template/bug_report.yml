name: "🐛 Bug Report"
description: "Create a report to help us reproduce and fix a bug in Juicer"
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much information as possible.

  - type: input
    id: version
    attributes:
      label: "Juicer Version"
      description: "Which version of Juicer are you using?"
      placeholder: "e.g. V1.0.1"
    validations:
      required: true

  - type: dropdown
    id: macos_version
    attributes:
      label: "macOS Version"
      options:
        - "macOS 15 Sequoia"
        - "macOS 14 Sonoma"
        - "Other / Older"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of what the bug is."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "Steps to reproduce the behavior:"
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Relevant Logs or Crash Reports"
      description: "Paste any Terminal logs or macOS crash reports if available."
      render: shell
