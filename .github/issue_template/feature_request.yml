name: "✨ Feature Request"
description: "Suggest an idea or new developer feature for Juicer"
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new feature or developer utility in Juicer? Tell us about it!

  - type: textarea
    id: problem
    attributes:
      label: "Problem or Need"
      description: "Is your feature request related to a problem or limitation? Describe it."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe what feature or utility you would like added to Juicer."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Describe any alternative solutions or features you've considered."
