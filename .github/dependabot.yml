version: 2
updates:
  # Maintain dependencies for GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "actions"

  # Maintain Python dependencies in my_clean_crew
  - package-ecosystem: "pip"
    directory: "/my_clean_crew"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
