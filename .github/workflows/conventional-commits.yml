name: Conventional Commit Title Check

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  commitlint:
    name: Conventional Commits Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Check PR Title Prefix Format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          REGEX="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9\-]+\))?: .+"
          if [[ ! "$TITLE" =~ $REGEX ]]; then
            echo "Error: PR Title '$TITLE' does not match Conventional Commits format (e.g., 'feat: add switcher' or 'fix: resolve leak')."
            exit 1
          fi
          echo "PR Title matches conventional guidelines!"
