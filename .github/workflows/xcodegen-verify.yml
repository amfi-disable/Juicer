name: XcodeGen Sync Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Verify XcodeGen Configuration Sync
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: arch -arm64 brew install xcodegen

      - name: Regenerate Project
        run: xcodegen generate

      - name: Check Git Diff Cleanliness
        run: |
          # Allow non-zero exit if .xcodeproj isn't tracked (it may be gitignored)
          if git ls-files --error-unmatch juicer.xcodeproj/project.pbxproj 2>/dev/null; then
            git diff --exit-code juicer.xcodeproj/project.pbxproj \
              || (echo "Error: project.pbxproj is out of sync with project.yml. Run xcodegen generate locally and commit changes." && exit 1)
          else
            echo "project.pbxproj is not tracked by git (gitignored). Skipping sync check."
          fi
