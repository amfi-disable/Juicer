name: XcodeGen Sync Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Verify XcodeGen Configuration Sync
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Regenerate Project
        run: xcodegen generate

      - name: Check Git Diff Cleanliness
        run: |
          git diff --exit-code juicer.xcodeproj/project.pbxproj || (echo "Error: project.pbxproj is out of sync with project.yml. Please run xcodegen generate locally and push the changes." && exit 1)
