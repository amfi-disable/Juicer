name: "Cask: Auto-Update Homebrew Cask"

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-cask:
    name: Update Cask in homebrew-juicer
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest

    steps:
      - name: Calculate Cask Checksum
        id: calc_hash
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          # Clean version (strip V/v prefix if present)
          VERSION=$(echo "${TAG_NAME}" | sed 's/[Vv]//')
          DOWNLOAD_URL="https://github.com/amfi-disable/Juicer/releases/download/${TAG_NAME}/juicer.zip"
          
          echo "Downloading juicer.zip from ${DOWNLOAD_URL}..."
          curl -L -o juicer.zip "${DOWNLOAD_URL}"
          
          SHA256=$(sha256sum juicer.zip | awk '{print $1}')
          echo "Calculated SHA256: ${SHA256}"
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT
          echo "download_url=${DOWNLOAD_URL}" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-juicer Tap
        uses: actions/checkout@v7
        with:
          repository: amfi-disable/homebrew-juicer
          token: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
          path: homebrew-juicer

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Update Cask Definition
        run: |
          cd homebrew-juicer
          VERSION="${{ steps.calc_hash.outputs.version }}"
          SHA256="${{ steps.calc_hash.outputs.sha256 }}"
          
          # Replace version and sha256 in casks/juicer.rb
          sed -i "s|version \".*\"|version \"${VERSION}\"|g" casks/juicer.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|g" casks/juicer.rb
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add casks/juicer.rb
          
          # Commit and push changes if updated
          if git diff --staged --quiet; then
            echo "No changes to Cask definition."
          else
            git commit -m "chore: bump juicer cask to version ${VERSION}"
            git push origin main
          fi
