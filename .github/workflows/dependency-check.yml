name: Dependency Vulnerability Audit

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 1 * *' # Monthly

jobs:
  audit:
    name: Swift Package Manager Vulnerability Scan
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -r | head -1)/Contents/Developer

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project juicer.xcodeproj \
            -scheme juicer \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            || echo "No custom external dependencies registered"
