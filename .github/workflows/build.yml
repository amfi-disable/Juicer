name: "CI: Build macOS Application"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build macOS Target
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -r | head -1)/Contents/Developer

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: arch -arm64 brew install xcodegen

      - name: Generate Xcode Project
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          xcodegen generate

      - name: Build macOS Target (skip signing)
        run: |
          xcodebuild build \
            -project juicer.xcodeproj \
            -scheme juicer \
            -sdk macosx \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true
