name: CodeQL Static Security Scan

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Sunday weekly

jobs:
  analyze:
    name: CodeQL Security Vulnerability Scan
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: swift

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: arch -arm64 brew install xcodegen

      - name: Generate Xcode Project
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          xcodegen generate

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -r | head -1)/Contents/Developer

      - name: Build Code For Compilation Target Scan
        run: |
          xcodebuild build \
            -project juicer.xcodeproj \
            -scheme juicer \
            -sdk macosx \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Perform CodeQL Analysis Diagnostics
        uses: github/codeql-action/analyze@v3
