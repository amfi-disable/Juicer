name: "Security: CodeQL SAST Analysis"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Scan
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -r | head -1)/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'swift'

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Swift Application for CodeQL
        run: |
          xcodebuild build \
            -project juicer.xcodeproj \
            -scheme juicer \
            -sdk macosx \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
