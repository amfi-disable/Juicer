name: "Release: Package & Publish GitHub Release"

on:
  push:
    tags:
      - 'V*.*.*'

permissions:
  contents: write

jobs:
  package:
    name: Package macOS Release
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -r | head -1)/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Release App
        run: |
          xcodebuild build \
            -project juicer.xcodeproj \
            -scheme juicer \
            -configuration Release \
            -sdk macosx \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO

      - name: Create Archive
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "$HOME/Library/Developer/Xcode/DerivedData/juicer-"*/Build/Products/Release/Juicer.app \
            juicer.zip
          shasum -a 256 juicer.zip | tee juicer.zip.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" juicer.zip juicer.zip.sha256 \
            --title "Juicer ${GITHUB_REF_NAME}" \
            --generate-notes || gh release upload "${GITHUB_REF_NAME}" juicer.zip juicer.zip.sha256 --clobber
