name: First Time Contributor Welcome

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  welcome:
    name: Greet First Time Contributor
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Welcome New Contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: 'Welcome! Thank you for opening your first issue in the Juicer project! We appreciate your feedback and will review it shortly.'
          pr-message: 'Welcome! Thank you for submitting your first Pull Request! Our maintainers will audit your code changes soon.'
