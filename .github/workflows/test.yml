name: run release validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: run release validation
    runs-on: macos-14

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: select xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -r | head -1)/Contents/Developer

      - name: install xcodegen
        run: brew install xcodegen

      - name: generate xcode project
        run: xcodegen generate

      - name: validate swift sources
        run: |
          swiftc -parse $(find juicer/sources -name '*.swift' -print)

      - name: build release target
        run: |
          xcodebuild build \
            -project juicer.xcodeproj \
            -scheme juicer \
            -configuration Release \
            -sdk macosx \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
