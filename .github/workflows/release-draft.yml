name: Release Packager

on:
  push:
    tags:
      - 'v*'
      - 'V*'

jobs:
  release:
    name: Package Draft Release Package
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: arch -arm64 brew install xcodegen

      - name: Generate Xcode Project
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          xcodegen generate

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -r | head -1)/Contents/Developer

      - name: Build and Archive Release Application
        run: |
          xcodebuild archive \
            -project juicer.xcodeproj \
            -scheme juicer \
            -archivePath build/juicer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
          mkdir -p build/Payload
          ditto build/juicer.xcarchive/Products/Applications/Juicer.app build/Payload/Juicer.app
          cd build
          zip -r Juicer-mac.zip Payload/Juicer.app
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            build/Juicer-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
