name: Release Packager

on:
  push:
    tags:
      - 'v*'
      - 'V*'

jobs:
  release:
    name: Package Draft Release Package
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: arch -arm64 brew install xcodegen

      - name: Generate Xcode Project
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          xcodegen generate

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -r | head -1)/Contents/Developer

      - name: Build and Archive Release Application
        run: |
          xcodebuild archive \
            -project juicer.xcodeproj \
            -scheme juicer \
            -archivePath build/juicer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
          mkdir -p build/Payload
          ditto build/juicer.xcarchive/Products/Applications/juicer.app build/Payload/juicer.app
          cd build
          zip -r juicer-mac.zip Payload/juicer.app
          cd ..

      - name: Install create-dmg
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: arch -arm64 brew install create-dmg

      - name: Create DMG Package
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          mkdir -p build/dmg-src
          ditto build/juicer.xcarchive/Products/Applications/juicer.app build/dmg-src/juicer.app
          create-dmg \
            --volname "Juicer" \
            --skip-jenkins \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "juicer.app" 175 120 \
            --hide-extension "juicer.app" \
            --app-drop-link 425 120 \
            "build/Juicer.dmg" \
            "build/dmg-src/"

      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            build/juicer-mac.zip
            build/Juicer.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
