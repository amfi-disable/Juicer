name: Release Packager

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Package Draft Release Package
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -r | head -1)/Contents/Developer

      - name: Build and Archive Release Application
        run: |
          xcodebuild archive \
            -project juicer.xcodeproj \
            -scheme juicer \
            -archivePath build/juicer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
          mkdir -p build/Payload
          cp -r build/juicer.xcarchive/Products/Applications/juicer.app build/Payload/
          cd build
          zip -r juicer-mac.zip Payload/juicer.app

      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: build/juicer-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
