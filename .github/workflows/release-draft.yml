name: Release Packager

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Package Draft Release Package
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build and Archive Release Application
        run: |
          xcodebuild archive -project juicer.xcodeproj -scheme juicer -archivePath build/juicer.xcarchive
          mkdir -p build/Payload
          cp -r build/juicer.xcarchive/Products/Applications/juicer.app build/Payload/
          cd build
          zip -r juicer-mac.zip Payload/juicer.app

      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: build/juicer-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
